<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>JamHouse Admin</title>
  <link rel="icon" type="image/svg+xml" href="/images/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/admin.css">
</head>
<body>
<div id="login-view">
  <div class="login-box">
    <h1>JamHouse</h1>
    <div class="sub">Live Music Barrio</div>
    <p class="desc">Member Login</p>
    <form id="login-form">
      <input type="password" id="password" placeholder="Password" required>
      <button type="submit">Enter</button>
    </form>
    <p class="login-error" id="login-error"></p>
  </div>
</div>
<script>
  document.getElementById('login-form').addEventListener('submit', async function(e) {
    e.preventDefault();
    var err = document.getElementById('login-error');
    err.style.display = 'none';
    var password = document.getElementById('password').value;
    try {
      var res = await fetch('/api/members', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ password: password }) });
      if (!res.ok) { err.textContent = 'Wrong password'; err.style.display = 'block'; return; }
      var data = await res.json();
      sessionStorage.setItem('jh_pass', password);
      if (data.admin) { sessionStorage.setItem('jh_admin', '1'); window.location.href = '/admin/applications'; }
      else { sessionStorage.removeItem('jh_admin'); window.location.href = '/admin/demographics'; }
    } catch (e) { err.textContent = 'Something went wrong'; err.style.display = 'block'; }
  });
  (async function() {
    var cached = sessionStorage.getItem('jh_pass');
    if (!cached) return;
    try {
      var res = await fetch('/api/members', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ password: cached }) });
      if (res.ok) {
        var data = await res.json();
        if (data.admin) { sessionStorage.setItem('jh_admin', '1'); window.location.href = '/admin/applications'; }
        else window.location.href = '/admin/demographics';
      } else { sessionStorage.removeItem('jh_pass'); sessionStorage.removeItem('jh_admin'); }
    } catch (e) {}
  })();
</script>
</body>
</html>
