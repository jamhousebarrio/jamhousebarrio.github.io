---
layout: none
title: Inventory - JamHouse Admin
access: general
---
<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Inventory - JamHouse Admin</title>
  <meta name="access" content="general">
  <link rel="icon" type="image/svg+xml" href="/images/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/admin.css">
  <style>
    .inventory-toolbar { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
    .filter-btns { display: flex; gap: 6px; flex-wrap: wrap; }
    .filter-btn { padding: 0.4rem 0.85rem; background: var(--surface); border: 1px solid var(--border); border-radius: 20px; color: var(--text-muted); font-family: var(--heading); font-size: 0.78rem; cursor: pointer; transition: all 0.15s; }
    .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
    .filter-btn.active { background: var(--accent); border-color: var(--accent); color: var(--bg); font-weight: 600; }
    .search-box { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-family: var(--body); font-size: 0.85rem; padding: 6px 10px; width: 200px; }
    .search-box:focus { border-color: var(--accent); outline: none; }
    .add-item-btn { margin-left: auto; padding: 0.45rem 1rem; background: var(--accent); border: none; border-radius: 6px; color: var(--bg); font-family: var(--heading); font-size: 0.85rem; font-weight: 600; cursor: pointer; }
    .add-item-btn:hover { opacity: 0.9; }
    .inventory-list { display: flex; flex-direction: column; gap: 0; }
    .item-row { display: flex; align-items: center; gap: 14px; padding: 10px 14px; background: var(--surface); border: 1px solid var(--border); border-bottom: none; transition: border-color 0.15s; }
    .item-row:first-child { border-radius: 8px 8px 0 0; }
    .item-row:last-child { border-bottom: 1px solid var(--border); border-radius: 0 0 8px 8px; }
    .item-row:only-child { border-bottom: 1px solid var(--border); border-radius: 8px; }
    .item-row:hover { border-color: var(--accent); position: relative; z-index: 1; }
    .item-name { font-family: var(--heading); font-size: 0.88rem; font-weight: 600; color: var(--text); margin: 0; white-space: nowrap; min-width: 180px; }
    .item-category { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 0.7rem; font-weight: 600; font-family: var(--heading); text-transform: uppercase; letter-spacing: 0.05em; white-space: nowrap; }
    .item-qty { font-size: 0.82rem; color: var(--text-muted); min-width: 50px; }
    .item-notes { font-size: 0.78rem; color: var(--text-muted); font-style: italic; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .item-actions { display: flex; gap: 6px; margin-left: auto; flex-shrink: 0; }
    .btn-edit { padding: 4px 12px; background: var(--surface); border: 1px solid var(--border); border-radius: 4px; color: var(--text-muted); font-family: var(--heading); font-size: 0.75rem; cursor: pointer; }
    .btn-edit:hover { border-color: var(--accent); color: var(--accent); }
    .btn-delete { padding: 4px 12px; background: none; border: 1px solid rgba(244,67,54,0.3); border-radius: 4px; color: #f44336; font-family: var(--heading); font-size: 0.75rem; cursor: pointer; }
    .btn-delete:hover { background: rgba(244,67,54,0.1); }
    .empty-state { color: var(--text-muted); font-size: 0.9rem; padding: 40px; text-align: center; }
    .item-count { color: var(--text-muted); font-size: 0.8rem; }
    @media (max-width: 680px) {
      .item-row { flex-wrap: wrap; gap: 6px; }
      .item-name { min-width: auto; }
      .item-notes { width: 100%; }
      .search-box { width: 100%; }
    }
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; justify-content: center; align-items: center; }
    .modal-overlay.active { display: flex; }
    .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; max-width: 520px; width: 90%; max-height: 90vh; overflow-y: auto; padding: 24px; }
    .modal h2 { font-family: var(--heading); color: var(--accent); margin: 0 0 16px; display: flex; justify-content: space-between; align-items: center; font-size: 1.1rem; }
    .modal-close { background: none; border: none; color: var(--text-muted); font-size: 1.4rem; cursor: pointer; }
    .modal-close:hover { color: var(--text); }
    .modal-body { display: flex; flex-direction: column; gap: 12px; }
    .modal-body label { font-size: 0.78rem; color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; display: block; margin-bottom: 2px; }
    .modal-body input, .modal-body select, .modal-body textarea { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-family: var(--body); font-size: 0.85rem; padding: 7px 10px; box-sizing: border-box; }
    .modal-body input:focus, .modal-body select:focus, .modal-body textarea:focus { border-color: var(--accent); outline: none; }
    .modal-body textarea { min-height: 70px; resize: vertical; }
    .modal-body input[disabled] { opacity: 0.5; cursor: not-allowed; }
    .modal-actions { display: flex; gap: 8px; margin-top: 8px; }
    .btn-primary { padding: 0.45rem 1rem; background: var(--accent); border: none; border-radius: 6px; color: var(--bg); font-family: var(--heading); font-size: 0.85rem; font-weight: 600; cursor: pointer; }
    .btn-primary:hover { opacity: 0.9; }
    .btn-secondary { padding: 0.45rem 1rem; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-family: var(--heading); font-size: 0.85rem; cursor: pointer; }
    .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }
  </style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/assets/js/supabase-client.js"></script>
</head>
<body>
<nav class="sidebar"></nav>

<div class="main">
  <div class="page-header">
    <h1><span class="icon" style="color:var(--accent)">&#128722;</span> Inventory</h1>
    <div class="subtitle">Materials, tools, and equipment</div>
  </div>

  <div class="inventory-toolbar">
    <div class="filter-btns" id="filter-btns">
      <button class="filter-btn active" data-filter="all">All</button>
    </div>
    <input type="text" class="search-box" id="search-box" placeholder="Search items...">
    <span class="item-count" id="item-count"></span>
    <button class="add-item-btn" id="add-item-btn" style="display:none">+ Add Item</button>
  </div>

  <div class="inventory-list" id="inventory-list">
    <div class="empty-state">Loading inventory...</div>
  </div>
</div>

<!-- Add / Edit Item modal -->
<div class="modal-overlay" id="item-modal">
  <div class="modal">
    <h2 id="modal-title">Add Item <button class="modal-close" id="modal-close">&times;</button></h2>
    <div class="modal-body">
      <div>
        <label>Name</label>
        <input id="field-name" placeholder="Display name">
      </div>
      <div>
        <label>Category</label>
        <input id="field-category" placeholder="e.g. Kitchen, Music, Lights">
      </div>
      <div>
        <label>Description</label>
        <textarea id="field-description" placeholder="Brief description of the item"></textarea>
      </div>
      <div>
        <label>Photo URL</label>
        <input id="field-photo" placeholder="https://drive.google.com/... or any image URL">
      </div>
      <div>
        <label>Quantity</label>
        <input id="field-quantity" placeholder="e.g. 2, 1 set, 3 boxes">
      </div>
      <div>
        <label>Location</label>
        <input id="field-location" placeholder="e.g. Storage trailer, Tent A">
      </div>
      <div>
        <label>Notes</label>
        <textarea id="field-notes" placeholder="Any additional notes"></textarea>
      </div>
    </div>
    <div class="modal-actions" style="margin-top:16px">
      <button class="btn-primary" id="modal-save-btn">Save Item</button>
      <button class="btn-secondary" id="modal-cancel-btn">Cancel</button>
    </div>
  </div>
</div>

<script src="/assets/js/admin-auth.js"></script>
<script src="/assets/js/admin-inventory.js"></script>
</body>
</html>
