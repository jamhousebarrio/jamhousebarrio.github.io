---
layout: none
title: Applications - JamHouse Admin
access: admin
---
<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Applications - JamHouse Admin</title>
  <meta name="access" content="admin">
  <link rel="icon" type="image/svg+xml" href="/images/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/admin.css">
  <link rel="stylesheet" href="/assets/css/ag-dark.css">
  <style>
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 100;
      justify-content: center;
      align-items: center;
    }
    .modal-overlay.active { display: flex; }
    .modal {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      max-width: 650px;
      width: 90%;
      max-height: 85vh;
      overflow-y: auto;
      padding: 2rem;
    }
    .modal h2 {
      font-family: 'Space Grotesk', sans-serif;
      color: #e8a84c;
      margin: 0 0 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .modal-close {
      background: none;
      border: none;
      color: #888;
      font-size: 1.5rem;
      cursor: pointer;
    }
    .modal-close:hover { color: #e0e0e0; }
    .detail-row {
      display: grid;
      grid-template-columns: 140px 1fr;
      gap: 0.5rem;
      padding: 0.6rem 0;
      border-bottom: 1px solid #222;
      font-size: 0.9rem;
    }
    .detail-label { color: #888; font-weight: 500; }
    .detail-value { color: #e0e0e0; word-break: break-word; }
    .status-actions {
      margin-top: 1.5rem;
      padding-top: 1rem;
      border-top: 1px solid #2a2a2a;
      display: flex;
      gap: 0.75rem;
      align-items: center;
    }
    .status-actions button {
      padding: 0.5rem 1.5rem;
      background: #e8a84c;
      color: #0a0a0a;
      border: none;
      border-radius: 6px;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 600;
      cursor: pointer;
    }
    .status-actions button:hover { opacity: 0.9; }
    .status-actions .msg { font-size: 0.85rem; margin-left: 0.5rem; }
    .field-input {
      width: 100%;
      background: #0a0a0a;
      border: 1px solid #2a2a2a;
      border-radius: 4px;
      color: #e0e0e0;
      font-family: 'Inter', sans-serif;
      font-size: 0.85rem;
      padding: 0.35rem 0.5rem;
      box-sizing: border-box;
    }
    .field-input:focus { border-color: #e8a84c; outline: none; }
    textarea.field-input { min-height: 60px; resize: vertical; }
    .detail-value a { text-decoration: none; font-size: 0.8rem; font-weight: 500; }
    .detail-value a:hover { text-decoration: underline; }
    .filter-row { display: flex; gap: 0.75rem; align-items: center; margin-bottom: 1rem; flex-wrap: wrap; }
    .filter-row select { padding: 0.45rem 0.75rem; background: #0a0a0a; border: 1px solid #2a2a2a; border-radius: 6px; color: #e0e0e0; font-size: 0.85rem; }
    .filter-row .count { color: #888; font-size: 0.85rem; margin-left: auto; }
    #app-grid { flex: 1; min-height: 300px; }
    .main { display: flex; flex-direction: column; height: 100vh; box-sizing: border-box; }
    .panel { flex: 1; display: flex; flex-direction: column; min-height: 0; }
    @media (max-width: 600px) {
      .modal { padding: 1.25rem; max-height: 90vh; width: 95%; }
      .detail-row { grid-template-columns: 1fr; gap: 0.25rem; }
      .detail-label { font-size: 0.75rem; }
      .col-toggles { display: none; }
      .stats-row { display: none; }
      .filter-row { margin-bottom: 0.5rem; }
      .page-header { margin-bottom: 8px; }
    }
  </style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/assets/js/supabase-client.js"></script>
</head>
<body>
<nav class="sidebar"></nav>
<div class="main">
  <div class="page-header" style="display:flex;align-items:center;justify-content:space-between;">
    <div>
      <h1><span class="icon">&#9993;</span> Applications</h1>
      <div class="subtitle">Review and manage membership applications</div>
    </div>
    <button id="process-btn" style="background:none;border:1px solid var(--border);border-radius:8px;color:var(--text-muted);cursor:pointer;padding:6px 14px;font-size:0.8rem;font-family:var(--body);white-space:nowrap;">&#9432; Process</button>
  </div>
  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-label">Total</div>
      <div class="stat-number" id="stat-total">-</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Pending</div>
      <div class="stat-number" id="stat-pending" style="color:#ff9800;">-</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Review</div>
      <div class="stat-number" id="stat-review" style="color:#29b6f6;">-</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Vibe Check</div>
      <div class="stat-number" id="stat-vibe-check" style="color:#ab47bc;">-</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Team Discussion</div>
      <div class="stat-number" id="stat-team-discussion" style="color:#78909c;">-</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">On-boarding</div>
      <div class="stat-number" id="stat-on-boarding" style="color:#26a69a;">-</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Approved</div>
      <div class="stat-number" id="stat-approved" style="color:#4caf50;">-</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Rejected</div>
      <div class="stat-number" id="stat-rejected" style="color:#f44336;">-</div>
    </div>
  </div>
  <div class="panel">
    <div class="filter-row">
      <select id="statusFilter">
        <option value="" selected>All Applications</option>
        <option value="Pending">Pending</option>
        <option value="Review">Review</option>
        <option value="Vibe Check">Vibe Check</option>
        <option value="Team Discussion">Team Discussion</option>
        <option value="On-boarding">On-boarding</option>
        <option value="Approved">Approved</option>
        <option value="Rejected">Rejected</option>
      </select>
      <div class="col-toggles" id="colToggles"></div>
      <span class="count" id="filter-count"></span>
    </div>
    <div id="app-grid" class="ag-theme-alpine-dark"></div>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h2>
      <span id="modal-title">Application</span>
      <button class="modal-close" id="modalClose">&times;</button>
    </h2>
    <div id="modal-details"></div>
    <div class="status-actions" id="status-actions">
      <button id="modal-save">Save All</button>
      <span class="msg" id="modal-msg"></span>
    </div>
  </div>
</div>

<div class="modal-overlay" id="processOverlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:200;justify-content:center;align-items:center;cursor:pointer;">
  <img src="/images/recruitment-process.jpg" alt="Recruitment Process" style="max-width:90vw;max-height:90vh;border-radius:12px;box-shadow:0 8px 40px rgba(0,0,0,0.5);">
  <button style="position:fixed;top:16px;right:20px;background:none;border:none;color:#fff;font-size:2rem;cursor:pointer;z-index:201;">&times;</button>
</div>
<script>
  (function() {
    var overlay = document.getElementById('processOverlay');
    document.getElementById('process-btn').addEventListener('click', function() {
      overlay.style.display = 'flex';
    });
    overlay.addEventListener('click', function() {
      overlay.style.display = 'none';
    });
  })();
</script>

<script src="https://cdn.jsdelivr.net/npm/ag-grid-community@32/dist/ag-grid-community.min.js"></script>
<script src="/assets/js/admin-auth.js"></script>
<script src="/assets/js/admin-applications.js"></script>
</body>
</html>
