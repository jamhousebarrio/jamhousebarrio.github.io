---
layout: none
title: Shifts - JamHouse Admin
access: general
---
<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Shifts - JamHouse Admin</title>
  <meta name="access" content="general">
  <link rel="icon" type="image/svg+xml" href="/images/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/admin.css">
  <style>
    .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 20px; }
    .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 16px 20px; }
    .stat-label { font-family: var(--heading); font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-muted); font-weight: 600; margin-bottom: 4px; }
    .stat-number { font-family: var(--heading); font-size: 1.8rem; font-weight: 700; color: var(--text); }

    .shift-grid { overflow-x: auto; -webkit-overflow-scrolling: touch; }
    .shift-grid table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
    .shift-grid th { font-family: var(--heading); padding: 10px 12px; text-align: center; font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-muted); border-bottom: 2px solid var(--border); font-weight: 600; white-space: nowrap; }
    .shift-grid th:first-child, .shift-grid th:nth-child(2) { text-align: left; }
    .shift-grid td { padding: 12px; border-bottom: 1px solid var(--border); vertical-align: top; text-align: center; min-width: 110px; }
    .shift-grid td:first-child { text-align: left; font-weight: 700; color: var(--accent); font-family: var(--heading); font-size: 0.88rem; min-width: 140px; white-space: nowrap; }
    .role-name-btn { background: none; border: none; color: inherit; font: inherit; cursor: pointer; padding: 0; text-align: left; }
    .role-name-btn:hover { text-decoration: underline; }
    .edit-type-btn { background: none; border: none; color: var(--text-muted); cursor: pointer; opacity: 0.5; font-size: 0.8rem; padding: 2px 4px; }
    .edit-type-btn:hover { color: var(--accent); opacity: 1; }
    .slot-group { display: flex; flex-direction: column; gap: 3px; padding: 4px 0; border-top: 1px dashed var(--border); }
    .slot-group:first-child { border-top: none; padding-top: 0; }
    .slot-time { font-family: var(--heading); font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.04em; }
    .slot-row { display: grid; grid-template-columns: 1fr 1fr auto; gap: 6px; align-items: center; margin-bottom: 6px; }
    .slot-row input { background: var(--bg); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-family: var(--body); font-size: 0.85rem; padding: 7px 10px; }
    .slot-row-remove { background: none; border: none; color: var(--text-muted); font-size: 1.1rem; cursor: pointer; padding: 4px 8px; }
    .slot-row-remove:hover { color: #f44336; }
    .add-slot-row-btn { background: none; border: 1px dashed var(--border); border-radius: 6px; color: var(--accent); font-family: var(--heading); font-size: 0.78rem; font-weight: 600; padding: 6px 10px; cursor: pointer; }
    .add-slot-row-btn:hover { border-color: var(--accent); }
    .desc-body { font-size: 0.88rem; color: var(--text); line-height: 1.5; white-space: pre-wrap; }
    .desc-meta { font-size: 0.78rem; color: var(--text-muted); margin-bottom: 12px; }
    .desc-empty { font-style: italic; color: var(--text-muted); }
    .shift-grid td:nth-child(2) { text-align: left; font-size: 0.78rem; color: var(--text-muted); min-width: 160px; max-width: 200px; }
    .shift-grid tr:hover td { background: rgba(255,255,255,0.015); }

    .shift-cell { display: flex; flex-direction: column; gap: 4px; align-items: center; }
    .shift-chip { display: inline-block; padding: 3px 10px; border-radius: 10px; font-size: 0.75rem; font-weight: 500; max-width: 100%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .shift-chip.filled { background: rgba(76,175,80,0.15); color: #4caf50; border: 1px solid #4caf50; }
    .shift-chip.open { background: none; color: var(--text-muted); border: 1px dashed var(--border); }
    .signup-btn { background: none; border: none; color: var(--accent); font-family: var(--heading); font-size: 0.72rem; font-weight: 600; cursor: pointer; padding: 3px 8px; }
    .signup-btn:hover { text-decoration: underline; }
    .no-shift { color: var(--border); font-size: 1rem; }
    .remove-btn { background: none; border: none; color: var(--text-muted); font-size: 0.65rem; cursor: pointer; opacity: 0.5; }
    .remove-btn:hover { color: #f44336; opacity: 1; }

    .add-type-btn { display: flex; align-items: center; justify-content: center; gap: 6px; width: 100%; padding: 14px; margin-top: 16px; background: none; border: 2px dashed var(--border); border-radius: 10px; color: var(--accent); font-family: var(--heading); font-size: 0.85rem; font-weight: 600; cursor: pointer; transition: all 0.15s; }
    .add-type-btn:hover { border-color: var(--accent); background: rgba(232,168,76,0.05); }

    .empty-state { color: var(--text-muted); font-size: 0.9rem; padding: 32px; text-align: center; }
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; justify-content: center; align-items: center; }
    .modal-overlay.active { display: flex; }
    .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; max-width: 440px; width: 90%; padding: 24px; display: flex; flex-direction: column; gap: 12px; overflow: visible; }
    .modal h2 { font-family: var(--heading); color: var(--accent); margin: 0; font-size: 1.1rem; display: flex; justify-content: space-between; align-items: center; }
    .modal-close { background: none; border: none; color: var(--text-muted); font-size: 1.4rem; cursor: pointer; }
    .field { display: flex; flex-direction: column; gap: 4px; }
    .field label { font-size: 0.75rem; color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; }
    .field input, .field select, .field textarea { background: var(--bg); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-family: var(--body); font-size: 0.85rem; padding: 7px 10px; }
    .field textarea { min-height: 60px; resize: vertical; }
    .modal-actions { display: flex; gap: 8px; margin-top: 4px; }
    .btn-primary { padding: 0.45rem 1rem; background: var(--accent); border: none; border-radius: 6px; color: var(--bg); font-family: var(--heading); font-size: 0.85rem; font-weight: 600; cursor: pointer; }
    .msg { font-size: 0.8rem; align-self: center; }
    @media (max-width: 768px) {
      .stats-row { grid-template-columns: 1fr; }
      .shift-grid { font-size: 0.75rem; }
    }
  </style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/assets/js/supabase-client.js"></script>
</head>
<body>
<nav class="sidebar"></nav>

<div class="main">
  <div class="page-header">
    <h1><span class="icon" style="color:var(--accent)">&#9835;</span> Volunteer Shifts</h1>
    <div class="subtitle">Sign up for shifts or manage the schedule</div>
  </div>

  <div class="stats-row">
    <div class="stat-card"><div class="stat-label">Shift Types</div><div class="stat-number" id="stat-types">-</div></div>
    <div class="stat-card"><div class="stat-label">Filled Slots</div><div class="stat-number" id="stat-filled">-</div></div>
    <div class="stat-card"><div class="stat-label">Open Slots</div><div class="stat-number" id="stat-open" style="color:#ff9800">-</div></div>
  </div>

  <div class="panel" style="padding:0;overflow:hidden">
    <div id="shifts-wrap"><div class="empty-state">Loading...</div></div>
  </div>

  <button class="add-type-btn" id="add-shift-btn" style="display:none">+ Add Shift Type</button>
</div>

<!-- Add / edit shift modal -->
<div class="modal-overlay" id="add-modal">
  <div class="modal">
    <h2 id="add-modal-title">Add Shift Type <button class="modal-close" id="add-modal-close">&times;</button></h2>
    <div class="field">
      <label>Shift name</label>
      <input id="shift-name" placeholder="e.g. Chef, Door Shift, Cleanup">
    </div>
    <div class="field">
      <label>Description</label>
      <textarea id="shift-desc" placeholder="What does this shift involve?"></textarea>
    </div>
    <div class="field">
      <label>Time slots</label>
      <div id="slots-list"></div>
      <button type="button" id="add-slot-row-btn" class="add-slot-row-btn">+ Add another slot</button>
    </div>
    <div class="modal-actions">
      <button id="add-shift-save" class="btn-primary">Create for all days</button>
      <span id="add-msg" class="msg"></span>
    </div>
  </div>
</div>

<!-- Description popover -->
<div class="modal-overlay" id="desc-modal">
  <div class="modal">
    <h2 id="desc-modal-title">Shift <button class="modal-close" id="desc-modal-close">&times;</button></h2>
    <div class="desc-meta" id="desc-modal-meta"></div>
    <div class="desc-body" id="desc-modal-body"></div>
  </div>
</div>

<!-- Assign modal -->
<div class="modal-overlay" id="assign-modal">
  <div class="modal">
    <h2>Sign Up <button class="modal-close" id="assign-modal-close">&times;</button></h2>
    <div id="assign-info" style="font-size:0.82rem;color:var(--text-muted);margin-bottom:8px"></div>
    <div class="field">
      <label>Volunteer</label>
      <select id="assign-select"><option value="">Select...</option></select>
    </div>
    <div class="modal-actions">
      <button id="assign-save" class="btn-primary">Assign</button>
      <span id="assign-msg" class="msg"></span>
    </div>
  </div>
</div>

<script src="/assets/js/admin-auth.js"></script>
<script src="/assets/js/admin-shifts.js"></script>
</body>
</html>
