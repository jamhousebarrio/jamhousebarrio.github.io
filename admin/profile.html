<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Profile - JamHouse Admin</title>
  <meta name="access" content="general">
  <link rel="icon" type="image/svg+xml" href="/images/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/admin.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/assets/js/supabase-client.js"></script>
</head>
<body>
<nav class="sidebar"></nav>
<div class="main">
  <div class="page-header">
    <h1><span class="icon">&#128100;</span> Profile</h1>
    <div class="subtitle">Manage your account and personal info</div>
  </div>

  <div class="panel" id="password-section">
    <h2>Change Password</h2>
    <div id="pw-banner" style="display:none;background:rgba(232,168,76,0.12);border:1px solid var(--accent);color:var(--accent);padding:10px 14px;border-radius:6px;margin-bottom:16px;font-size:0.9rem;">
      Please set a new password to continue
    </div>
    <form id="pw-form">
      <div class="form-group" id="current-password-row">
        <label for="current-password">Current Password</label>
        <input type="password" id="current-password" placeholder="Enter current password">
      </div>
      <div class="form-group">
        <label for="new-password">New Password</label>
        <input type="password" id="new-password" placeholder="At least 8 characters">
      </div>
      <div class="form-group">
        <label for="confirm-password">Confirm New Password</label>
        <input type="password" id="confirm-password" placeholder="Repeat new password">
      </div>
      <button type="submit" class="btn">Update Password</button>
      <div id="pw-msg" style="margin-top:10px;font-size:0.88rem;"></div>
    </form>
  </div>

  <div class="panel">
    <h2>Personal Info</h2>
    <div id="admin-badge" style="display:none;margin-bottom:16px;padding:8px 14px;border-radius:6px;font-size:0.88rem;font-weight:500;"></div>
    <form id="info-form">
      <div class="form-group">
        <label for="info-name">Name</label>
        <input type="text" id="info-name" placeholder="Full name">
      </div>
      <div class="form-group">
        <label for="info-playa-name">Playa Name</label>
        <input type="text" id="info-playa-name" placeholder="Your burn name">
      </div>
      <div class="form-group">
        <label for="info-email">Email</label>
        <input type="email" id="info-email" placeholder="Email address">
      </div>
      <div class="form-group">
        <label for="info-phone">Phone</label>
        <input type="text" id="info-phone" placeholder="Phone number">
      </div>
      <div class="form-group">
        <label for="info-location">Location</label>
        <input type="text" id="info-location" placeholder="City, Country">
      </div>
      <div class="form-group">
        <label for="info-nationality">Nationality</label>
        <input type="text" id="info-nationality" placeholder="Nationality">
      </div>
      <div class="form-group">
        <label for="info-gender">Gender</label>
        <input type="text" id="info-gender" placeholder="Gender">
      </div>
      <div class="form-group">
        <label for="info-age">Age</label>
        <input type="text" id="info-age" placeholder="Age">
      </div>
      <button type="submit" class="btn">Save Changes</button>
      <div id="info-msg" style="margin-top:10px;font-size:0.88rem;"></div>
    </form>
  </div>
</div>

<script src="/assets/js/admin-auth.js"></script>
<script src="/assets/js/admin-profile.js"></script>
</body>
</html>
